<style>

.case-world {
  --accent: #3fffa3;
  --accent2: #45d6ff;
  --gold: #d7ff64;

  position: relative;
  width: 100vw;
  min-height: calc(100vh - 54px);
  margin-left: calc(50% - 50vw);
  overflow: hidden;
  color: #dfffee;
  background:
    radial-gradient(circle at 30% 22%, rgba(31, 80, 95, 0.22), transparent 30%),
    radial-gradient(circle at 72% 58%, rgba(25, 96, 54, 0.18), transparent 28%),

}

#flowCanvas {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  z-index: 1;
  display: block;
  pointer-events: none;
}

.case-texture {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  opacity: 0.42;
  background-image:
    linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px),
    radial-gradient(circle at 50% 50%, transparent 0%, rgba(0,0,0,0.55) 100%);

  mix-blend-mode: overlay;
}

.case-vignette {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
  background:
    radial-gradient(circle at var(--mx, 52%) var(--my, 48%),

.case-nav {

  top: 34px;
  right: 36px;

  display: flex;
  align-items: center;
  gap: 24px;
  padding: 12px 28px;
  border-radius: 999px;
  background: rgba(2, 10, 8, 0.72);
  border: 1px solid rgba(120, 255, 190, 0.32);
  box-shadow:
    0 0 24px rgba(63, 255, 163, 0.22),
    inset 0 0 18px rgba(63, 255, 163, 0.05);
  backdrop-filter: blur(14px);
}

.case-nav a {
  color: #dfffee;

  font-weight: 800;
  font-size: 13px;
  letter-spacing: 0.08em;

}

}

  filter: blur(0.2px) drop-shadow(0 0 8px rgba(63,255,163,0.9));
}

.case-pager {
  position: fixed;
  top: 94px;
  right: 52px;
  z-index: 20;
  display: flex;
  align-items: center;
  gap: 10px;
  color: rgba(223, 255, 238, 0.64);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.06em;
}

.case-pager button {
  border: 1px solid rgba(120,255,190,0.22);
  background: rgba(2,10,8,0.38);
  color: rgba(223,255,238,0.58);
  border-radius: 8px;
  padding: 7px 10px;
  cursor: pointer;

}

.case-pager button:hover {
  color: var(--accent);
  border-color: rgba(63,255,163,0.7);
  box-shadow: 0 0 18px rgba(63,255,163,0.24);
}

.case-stage {
  position: relative;
  z-index: 10;
  min-height: calc(100vh - 54px);
  perspective: 1200px;
}

.case-object {
  position: absolute;
  left: 50%;
  top: 47%;
  width: min(54vw, 760px);
  height: min(54vw, 760px);
  transform: translate(-50%, -50%) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg));
  transform-style: preserve-3d;
  transition: transform 0.08s linear;
}

.orbit-line {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 72%;
  height: 72%;
  transform: translate(-50%, -50%) rotate(var(--r));
  border: 2px solid rgba(145, 255, 204, 0.30);
  border-left-color: transparent;
  border-bottom-color: transparent;
  border-radius: 50%;
  filter:
    drop-shadow(0 0 10px rgba(63,255,163,0.5))

  animation: orbitFloat 9s ease-in-out infinite alternate;
}

.orbit-line.two {
  width: 86%;
  height: 86%;
  --r: -38deg;
  border-color: rgba(69, 214, 255, 0.22);
  border-right-color: transparent;
  border-top-color: transparent;
  animation-duration: 12s;
}

@keyframes orbitFloat {
  from { transform: translate(-50%, -50%) rotate(var(--r)) scale(0.97); }
  to { transform: translate(-50%, -50%) rotate(calc(var(--r) + 12deg)) scale(1.03); }
}

.energy-core {
  position: absolute;
  left: 50%;
  top: 48%;
  width: 134px;
  height: 134px;
  transform: translate(-50%, -50%) translateZ(90px);
  border-radius: 50%;
  background:
    radial-gradient(circle at 34% 28%, #ffffff 0%, #eafff6 12%, rgba(63,255,163,0.78) 25%, rgba(69,214,255,0.24) 48%, rgba(1,12,10,0.92) 74%);
  border: 1px solid rgba(210,255,230,0.82);
  box-shadow:

    0 0 70px rgba(69,214,255,0.36),

  display: flex;
  align-items: center;

}

.energy-core span {

}

@keyframes corePulse {
  0%, 100% {
    transform: translate(-50%, -50%) translateZ(90px) scale(1);

  }

}

.blade-fan {

}

.case-meta {

}

.slide-info {

}

.energy-ripple {
  position: fixed;

    0 0 20px rgba(63,255,163,0.9),

}

@keyframes energyRipple {

}

@media (max-width: 820px) {

  }

  .case-object {
    width: 92vw;

    top: 44%;
  }

  .case-meta {
    left: 26px;

  }

  .slide-info {
    display: none;
  }

  .energy-core {

  }
}

<script>
(function () {
  const canvas = document.getElementById("flowCanvas");
  const ctx = canvas.getContext("2d");
  const root = document.documentElement;
  const caseObject = document.getElementById("caseObject");
  const bladeFan = document.getElementById("bladeFan");

  const slideIndex = document.getElementById("slideIndex");
  const slideLabel = document.getElementById("slideLabel");
  const slideInfo = document.getElementById("slideInfo");
  const pagerText = document.getElementById("pagerText");
  const coreSymbol = document.getElementById("coreSymbol");
  const dotsBox = document.getElementById("caseDots");

  const slides = [
    {
      label: "RESEARCH NOTES",
      info: "Notes on AI accelerators, hardware-aware scheduling, reinforcement learning, FPGA/NPU systems, and computer architecture.",
      symbol: "卫",
      accent: "#3fffa3",
      accent2: "#45d6ff"
    },
    {
      label: "EXPERIMENT LOGS",
      info: "Records of simulation results, debugging process, training behavior, RTL experiments, and hardware modeling trials.",
      symbol: "实",
      accent: "#d7ff64",
      accent2: "#3fffa3"
    },
    {
      label: "CODE / RTL",
      info: "Implementation notes for Python, SystemVerilog, RTL design, FPGA workflows, and accelerator scheduling scripts.",
      symbol: "码",
      accent: "#45d6ff",
      accent2: "#a78bfa"
    },
    {
      label: "PERSONAL UPDATES",
      info: "Website updates, academic progress, personal reflections, and small records during my research journey.",
      symbol: "记",
      accent: "#7cffc7",
      accent2: "#f0ff8a"
    }
  ];

  let current = 0;
  let width = 0;
  let height = 0;
  let dpr = 1;

  const mouse = {
    x: window.innerWidth / 2,
    y: window.innerHeight / 2,
    px: window.innerWidth / 2,
    py: window.innerHeight / 2,
    vx: 0,
    vy: 0,
    speed: 0
  };

  let particles = [];
  let dust = [];
  let ribbonsPhase = 0;

  for (let i = 0; i < 28; i++) {
    const blade = document.createElement("div");
    blade.className = "blade";

    const angle = -74 + i * (148 / 27);
    const radius = 120 + Math.sin(i * 0.7) * 18;

    blade.style.transform =
      `rotate(${angle}deg) translateY(${radius}px) rotateX(${18 + Math.random() * 12}deg)`;

    blade.style.opacity = 0.38 + Math.random() * 0.56;
    blade.style.height = `${62 + Math.random() * 82}px`;

    bladeFan.appendChild(blade);
  }

  slides.forEach((_, i) => {
    const dot = document.createElement("div");
    dot.className = "case-dot" + (i === 0 ? " active" : "");
    dot.addEventListener("click", () => setSlide(i));
    dotsBox.appendChild(dot);
  });

  function setSlide(index) {
    current = (index + slides.length) % slides.length;
    const s = slides[current];

    slideIndex.textContent = current + 1;
    slideLabel.textContent = s.label;
    slideInfo.textContent = s.info;
    pagerText.textContent = s.label;
    coreSymbol.textContent = s.symbol;

    document.querySelectorAll(".case-dot").forEach((dot, i) => {
      dot.classList.toggle("active", i === current);
    });

    document.querySelector(".case-world").style.setProperty("--accent", s.accent);
    document.querySelector(".case-world").style.setProperty("--accent2", s.accent2);

    burst(width * 0.5, height * 0.48, 90);
  }

  document.getElementById("prevSlide").addEventListener("click", () => setSlide(current - 1));
  document.getElementById("nextSlide").addEventListener("click", () => setSlide(current + 1));

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    width = window.innerWidth;
    height = window.innerHeight;

    canvas.width = Math.floor(width * dpr);
    canvas.height = Math.floor(height * dpr);
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    initDust();
  }

  function initDust() {
    dust = [];
    const count = Math.floor(Math.min(900, width * height / 1500));

    for (let i = 0; i < count; i++) {
      const zone = Math.random();
      let x, y;

      if (zone < 0.62) {
        x = width * 0.5 + (Math.random() - 0.5) * width * 0.34;
        y = height * 0.24 + Math.random() * height * 0.42;
      } else {
        x = Math.random() * width;
        y = Math.random() * height;
      }

      dust.push({
        x,
        y,
        vx: (Math.random() - 0.5) * 0.18,
        vy: (Math.random() - 0.5) * 0.18,
        r: Math.random() * 1.8 + 0.25,
        a: Math.random() * 0.52 + 0.08,
        hue: Math.random() > 0.72 ? "cyan" : "green",
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function emitFromMouse() {
    const dx = mouse.x - mouse.px;
    const dy = mouse.y - mouse.py;
    const speed = Math.sqrt(dx * dx + dy * dy);

    mouse.vx = dx;
    mouse.vy = dy;
    mouse.speed = speed;

    const amount = Math.min(46, Math.floor(speed * 0.65));

    for (let i = 0; i < amount; i++) {
      const t = Math.random();
      const x = mouse.px + dx * t + (Math.random() - 0.5) * 16;
      const y = mouse.py + dy * t + (Math.random() - 0.5) * 16;

      particles.push({
        x,
        y,
        vx: -dx * (0.016 + Math.random() * 0.035) + (Math.random() - 0.5) * 2.2,
        vy: -dy * (0.016 + Math.random() * 0.035) + (Math.random() - 0.5) * 2.2,
        r: 0.8 + Math.random() * 4.5,
        life: 1,
        decay: 0.010 + Math.random() * 0.022,
        color: Math.random() > 0.65 ? "cyan" : (Math.random() > 0.25 ? "green" : "gold")
      });
    }

    mouse.px = mouse.x;
    mouse.py = mouse.y;
  }

  function burst(x, y, amount) {
    for (let i = 0; i < amount; i++) {
      const angle = Math.random() * Math.PI * 2;
      const force = 2 + Math.random() * 9;

      particles.push({
        x,
        y,
        vx: Math.cos(angle) * force,
        vy: Math.sin(angle) * force,
        r: 1 + Math.random() * 5,
        life: 1,
        decay: 0.012 + Math.random() * 0.024,
        color: Math.random() > 0.5 ? "green" : "cyan"
      });
    }
  }

  function colorFor(p, alphaMul = 1) {
    const a = Math.max(0, p.life || p.a) * alphaMul;

    if (p.color === "cyan" || p.hue === "cyan") {
      return `rgba(69, 214, 255, ${a})`;
    }

    if (p.color === "gold") {
      return `rgba(215, 255, 100, ${a})`;
    }

    return `rgba(63, 255, 163, ${a})`;
  }

  function drawRibbons() {
    ribbonsPhase += 0.01;

    const cx = width * 0.5;
    const cy = height * 0.49;

    ctx.save();
    ctx.globalCompositeOperation = "lighter";

    for (let i = 0; i < 9; i++) {
      const offset = (i - 4) * 18;
      const pulse = Math.sin(ribbonsPhase + i * 0.7) * 0.5 + 0.5;

      ctx.beginPath();
      ctx.moveTo(cx + offset, -60);
      ctx.bezierCurveTo(
        cx - 180 - pulse * 80,
        height * 0.25,
        cx - 82,
        height * 0.28 + offset * 0.35,
        cx,
        cy - 72
      );

      ctx.strokeStyle = `rgba(63, 255, 163, ${0.035 + pulse * 0.06})`;
      ctx.lineWidth = 1.1 + pulse * 1.8;
      ctx.shadowBlur = 18;
      ctx.shadowColor = "rgba(63,255,163,0.7)";
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(cx - offset, -60);
      ctx.bezierCurveTo(
        cx + 180 + pulse * 80,
        height * 0.25,
        cx + 82,
        height * 0.28 - offset * 0.35,
        cx,
        cy - 72
      );

      ctx.strokeStyle = `rgba(69, 214, 255, ${0.025 + pulse * 0.045})`;
      ctx.lineWidth = 1.0 + pulse * 1.6;
      ctx.stroke();
    }

    for (let i = 0; i < 16; i++) {
      const start = Math.PI * (0.18 + i * 0.032);
      const end = start + Math.PI * (0.18 + Math.sin(i) * 0.03);
      const r = 150 + i * 8;

      ctx.beginPath();
      ctx.arc(cx, cy + 126, r, start, end);
      ctx.strokeStyle = `rgba(210, 240, 255, ${0.05 + (i % 3) * 0.025})`;
      ctx.lineWidth = 2.2;
      ctx.shadowBlur = 12;
      ctx.shadowColor = "rgba(200,240,255,0.5)";
      ctx.stroke();
    }

    ctx.restore();
  }

  function updateDust() {
    const cx = width * 0.5;
    const cy = height * 0.42;

    for (const d of dust) {
      const dx = mouse.x - d.x;
      const dy = mouse.y - d.y;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;

      if (dist < 220) {
        const f = (220 - dist) / 220;
        d.vx -= dx / dist * f * 0.018;
        d.vy -= dy / dist * f * 0.018;
      }

      d.phase += 0.012;
      d.x += d.vx + Math.sin(d.phase) * 0.06;
      d.y += d.vy + Math.cos(d.phase * 0.8) * 0.05;

      d.vx *= 0.992;
      d.vy *= 0.992;

      if (d.x < -40 || d.x > width + 40 || d.y < -40 || d.y > height + 40) {
        d.x = cx + (Math.random() - 0.5) * width * 0.45;
        d.y = cy + (Math.random() - 0.5) * height * 0.55;
      }
    }
  }

  function drawDust() {
    ctx.save();
    ctx.globalCompositeOperation = "lighter";

    for (const d of dust) {
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
      ctx.fillStyle = d.hue === "cyan"
        ? `rgba(69,214,255,${d.a})`
        : `rgba(91,255,117,${d.a})`;

      ctx.shadowBlur = 10;
      ctx.shadowColor = d.hue === "cyan" ? "#45d6ff" : "#3fffa3";
      ctx.fill();
    }

    ctx.restore();
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];

      p.x += p.vx;
      p.y += p.vy;

      p.vx *= 0.982;
      p.vy *= 0.982;
      p.life -= p.decay;

      if (p.life <= 0) {
        particles.splice(i, 1);
      }
    }

    if (particles.length > 1800) {
      particles.splice(0, particles.length - 1800);
    }
  }

  function drawParticles() {
    ctx.save();
    ctx.globalCompositeOperation = "lighter";

    for (const p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      ctx.fillStyle = colorFor(p, 0.85);

      ctx.shadowBlur = 18;
      ctx.shadowColor = p.color === "cyan" ? "#45d6ff" : "#3fffa3";
      ctx.fill();
    }

    ctx.restore();
  }

  function animate() {
    requestAnimationFrame(animate);

    ctx.fillStyle = "rgba(2, 8, 6, 0.145)";
    ctx.fillRect(0, 0, width, height);

    emitFromMouse();
    drawRibbons();

    updateDust();
    drawDust();

    updateParticles();
    drawParticles();

    const speedTilt = Math.min(mouse.speed, 80);
    const rx = ((mouse.y / height) - 0.5) * -7;
    const ry = ((mouse.x / width) - 0.5) * 10;

    caseObject.style.setProperty("--rx", `${rx}deg`);
    caseObject.style.setProperty("--ry", `${ry + speedTilt * 0.03}deg`);
  }

  window.addEventListener("mousemove", (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;

    root.style.setProperty("--mx", (e.clientX / window.innerWidth * 100) + "%");
    root.style.setProperty("--my", (e.clientY / window.innerHeight * 100) + "%");
  });

  window.addEventListener("click", (e) => {
    burst(e.clientX, e.clientY, 80);

    const ripple = document.createElement("div");
    ripple.className = "energy-ripple";
    ripple.style.left = e.clientX + "px";
    ripple.style.top = e.clientY + "px";
    document.body.appendChild(ripple);
    setTimeout(() => ripple.remove(), 850);
  });

  window.addEventListener("resize", resize);

  resize();
  setSlide(0);

  ctx.fillStyle = "#020806";
  ctx.fillRect(0, 0, width, height);

  animate();
})();
</script>
