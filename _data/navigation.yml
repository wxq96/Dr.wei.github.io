<script>
(function () {
  const canvas = document.getElementById("blogParticleCanvas");
  const ctx = canvas.getContext("2d");
  const root = document.documentElement;
  const panel = document.getElementById("infoPanel");
  const panelTitle = document.getElementById("panelTitle");
  const panelText = document.getElementById("panelText");
  const closePanel = document.getElementById("closePanel");

  let width, height;
  let particles = [];
  const mouse = { x: 0, y: 0, active: false };

  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    initParticles();
  }

  class Particle {
    constructor() {
      this.reset();
    }

    reset() {
      this.x = Math.random() * width;
      this.y = Math.random() * height;
      this.vx = (Math.random() - 0.5) * 0.65;
      this.vy = (Math.random() - 0.5) * 0.65;
      this.size = Math.random() * 2.2 + 0.7;
      this.baseSize = this.size;
      this.color = Math.random() > 0.5
        ? "rgba(125, 211, 252, 0.88)"
        : "rgba(59, 130, 246, 0.76)";
    }

    update() {
      if (mouse.active) {
        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;

        if (dist < 210) {
          const force = (210 - dist) / 210;
          this.vx += (dx / dist) * force * 0.045;
          this.vy += (dy / dist) * force * 0.045;
          this.size = this.baseSize + force * 2.2;
        } else {
          this.size += (this.baseSize - this.size) * 0.06;
        }
      }

      this.x += this.vx;
      this.y += this.vy;

      this.vx *= 0.985;
      this.vy *= 0.985;

      if (this.x < -20 || this.x > width + 20 || this.y < -20 || this.y > height + 20) {
        this.reset();
      }
    }

    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.shadowBlur = 18;
      ctx.shadowColor = "#7dd3fc";
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  function initParticles() {
    particles = [];
    const count = Math.min(170, Math.floor(window.innerWidth / 8));
    for (let i = 0; i < count; i++) {
      particles.push(new Particle());
    }
  }

  function drawConnections() {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (dist < 115) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(125, 211, 252, ${0.14 * (1 - dist / 115)})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        }
      }
    }
  }

  function animate() {
    ctx.clearRect(0, 0, width, height);

    const gx = mouse.active ? mouse.x : width / 2;
    const gy = mouse.active ? mouse.y : height / 2;

    const gradient = ctx.createRadialGradient(gx, gy, 0, gx, gy, 460);
    gradient.addColorStop(0, "rgba(56, 189, 248, 0.12)");
    gradient.addColorStop(1, "rgba(2, 6, 23, 0)");

    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, width, height);

    particles.forEach(p => {
      p.update();
      p.draw();
    });

    drawConnections();
    requestAnimationFrame(animate);
  }

  window.addEventListener("resize", resize);

  window.addEventListener("mousemove", function (e) {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    mouse.active = true;

    root.style.setProperty("--mx", (e.clientX / window.innerWidth * 100) + "%");
    root.style.setProperty("--my", (e.clientY / window.innerHeight * 100) + "%");
  });

  window.addEventListener("mouseleave", function () {
    mouse.active = false;
  });

  window.addEventListener("click", function (e) {
    const ripple = document.createElement("div");
    ripple.className = "energy-ripple";
    ripple.style.left = e.clientX + "px";
    ripple.style.top = e.clientY + "px";
    document.body.appendChild(ripple);
    setTimeout(() => ripple.remove(), 820);

    particles.forEach(p => {
      const dx = p.x - e.clientX;
      const dy = p.y - e.clientY;
      const dist = Math.sqrt(dx * dx + dy * dy) || 1;

      if (dist < 240) {
        const force = (240 - dist) / 240;
        p.vx += (dx / dist) * force * 8;
        p.vy += (dy / dist) * force * 8;
      }
    });
  });

  document.querySelectorAll(".blog-node").forEach(function (node) {
    node.addEventListener("click", function (e) {
      e.stopPropagation();
      panelTitle.textContent = node.dataset.title;
      panelText.textContent = node.dataset.text;
      panel.classList.add("show");
    });
  });

  closePanel.addEventListener("click", function (e) {
    e.stopPropagation();
    panel.classList.remove("show");
  });

  resize();
  animate();
})();
</script>
